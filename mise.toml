[tools]
go = "latest"
"go:github.com/go-delve/delve/cmd/dlv" = "latest"
"go:golang.org/x/tools/gopls" = "latest"
"go:github.com/cweill/gotests/gotests" = "latest"
"go:github.com/josharian/impl" = "latest"
"go:github.com/magefile/mage" = "latest"

[env]
BUILD_DIR = "build"

[tasks.build]
description = "Build for current platform"
run = "mage build"

[tasks."build:all"]
description = "Build for all platforms"
run = "mage buildall"

[tasks."build:pi"]
description = "Build for Raspberry Pi (linux/arm)"
run = "mage buildpi"

[tasks."build:windows"]
description = "Build for Windows (windows/amd64)"
run = "mage buildwindows"

[tasks."build:linux"]
description = "Build for Linux desktop (linux/amd64)"
run = "mage buildlinux"

[tasks.clean]
description = "Remove build artifacts"
run = "mage clean"

[tasks.test]
description = "Run tests"
run = "mage test"

[tasks.lint]
description = "Run linter"
run = "mage lint"

[tasks."run:server"]
description = "Run server locally"
run = "mage runserver"

[tasks."run:client"]
description = "Run client locally"
run = "mage runclient"

[tasks."deploy:pi"]
description = "Deploy server to Raspberry Pi"
run = "mage deploypi"

[tasks."deploy:client"]
description = "Deploy client locally"
run = "mage deployclient"

[tasks.deps]
description = "Install Go dependencies"
run = "mage deps"
