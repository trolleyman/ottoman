# Ottoman Server Configuration
# Copy this file to one of these locations:
#   - ./config.toml (current directory)
#   - ~/.config/ottoman/config.toml (Linux user)
#   - /etc/ottoman/config.toml (Linux system)
#   - %APPDATA%/ottoman/config.toml (Windows)

[server]
listen_addr = ':8080'
auth_token = 'your-secret-token-here'
client_addr = '192.168.1.100:8081'
ping_url = 'https://example.com/api/ottoman/ping'
ping_interval = '5m'
device_id = 'ottoman-server'

[[server.wake_targets]]
name = 'desktop'
mac_address = '00:11:22:33:44:55'
ip_address = '192.168.1.100'
