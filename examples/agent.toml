# Ottoman Agent Configuration
# Copy this file to one of these locations:
#   - ./config.toml (current directory)
#   - ~/.config/ottoman/config.toml (Linux user)
#   - /etc/ottoman/config.toml (Linux system)
#   - %APPDATA%/ottoman/config.toml (Windows)

[agent]
listen_addr = ':17294'
auth_token = 'your-secret-token-here'

# Network-controlled TV (LG webOS). When set, the agent exposes /api/tv/* and
# the web UI shows a TV card. The pairing key is NOT stored here — it's kept in
# the data dir (~/.local/share/ottoman/tv.json) so redeploying config can't drop
# it. After configuring, pair once via the web UI "Pair" button (accept the
# on-screen prompt on the TV).
# [agent.tv]
# type = 'webos'
# host = '10.0.0.50'            # give the TV a DHCP reservation for a stable IP
# mac  = '8C:19:B5:72:FE:62'    # for Wake-on-LAN power-on (needs "TV On With Mobile")

# Example layout (add more with `ottoman agent layout add`)
# [[agent.layouts]]
# id = 'desktop'
# name = 'Desktop'
# emoji = '🖥️'
# aliases = ['d', 'main']
# [[agent.layouts.monitors]]
# edid = 'DEL:D0A2'
# width = 2560
# height = 1440
# refresh_rate = 144.0
# position_x = 0
# position_y = 0
# primary = true
# enabled = true
