# Ottoman Agent Configuration
# Copy this file to one of these locations:
#   - ./config.toml (current directory)
#   - ~/.config/ottoman/config.toml (Linux user)
#   - /etc/ottoman/config.toml (Linux system)
#   - %APPDATA%/ottoman/config.toml (Windows)

[agent]
listen_addr = ':17294'
auth_token = 'your-secret-token-here'

# Network-controlled TVs (LG webOS) are configured per monitor, not here: open
# the monitor's settings (cog) in the web UI, set the backend to "tv", and fill
# in the TV's host + MAC (give the TV a DHCP reservation for a stable IP; WoL
# power-on needs "TV On With Mobile"). Then pair once via the card's "Pair"
# button. Pairing keys are kept in the data dir
# (~/.local/share/ottoman/tv.json) so redeploying config can't drop them.

# Dual-boot OS selection (plan §7). Set GRUB_DEFAULT=saved (keep GRUB_TIMEOUT=5),
# then run `ottoman agent install` to get the grub-reboot sudoers rule. The
# entry names come from: grep menuentry /boot/grub/grub.cfg
# [agent.boot]
# linux_entry   = 'Zorin OS'
# windows_entry = 'Windows Boot Manager (on /dev/nvme0n1p1)'

# Example layout (add more with `ottoman agent layout add`)
