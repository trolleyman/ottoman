openapi: 3.0.3
info:
  title: Ottoman Controller API
  version: 1.0.0
paths:
  /health:
    get:
      summary: Health check
      operationId: checkHealth
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string
                example: "OK"

  /api/status:
    get:
      summary: Get system status
      operationId: getStatus
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'

  /api/status/agent:
    get:
      summary: Get agent status
      operationId: getAgentStatus
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Bad Gateway (Agent unreachable)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth:
    post:
      summary: Authenticate
      operationId: auth
      requestBody:
