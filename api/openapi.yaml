  /api/auth/check:
    get:
      summary: Check authentication status
      operationId: checkAuth
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  authenticated:
                    type: boolean
                    description: Whether the user is authenticated.
                    example: true
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
