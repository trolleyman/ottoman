components:
  schemas:
    # --- Shared Types ---
    ErrorResponse:
      type: object
      required: [error, code]
      properties:
        error: { type: string }
        code: { type: integer }
        details: { type: string }

    StatusResponse:
      type: object
      required: [status, version, uptime, hostname, ip_address, port, secret]
      properties:
        status: { type: string }
        version: { type: string }
        uptime: { type: string }
        hostname: { type: string, format: hostname }
        ip_address:
          oneOf:
            - type: string
              format: ipv4
            - type: string
              format: ipv6
        port: { type: string, format: uint16 }
        secret: { type: string }
        # Reachable UI origins in priority order, best first (agent direct
        # beats controller proxy), so the SPA can hop to the lowest-latency
        # endpoint. The controller only lists the agent while it answers
        # /health.
        endpoints:
          type: array
          items: { type: string, format: uri }
        # Whether the requesting client appears to be on the server's own
        # network (direct LAN request, or a tunnelled request whose forwarded
        # IP matches the network's public IP). Lets the SPA redirect from an
        # https tunnel, where mixed-content rules forbid probing http targets.
        client_is_local: { type: boolean }

    Monitor:
      type: object
      required: [edid, port, name, manufacturer]
      properties:
        edid: { type: string }
        port: { type: string }
        name: { type: string }
        manufacturer: { type: string }
        active: { $ref: '#/components/schemas/ActiveMonitor' }
        # Registry-derived control metadata (optional).
        friendly_name: { type: string }
        control_backend: { type: string, description: "ddc | i2c | tv | none" }
        brightness: { type: integer, description: "current 0-100, -1 if unknown" }
        capabilities: { $ref: '#/components/schemas/MonitorCapabilities' }
        visibility:
          type: object
          additionalProperties: { type: boolean }
        tv: { $ref: '#/components/schemas/TVConn' }
        # Live TV integration state (tv-backend monitors only).
        tv_state: { $ref: '#/components/schemas/MonitorTVState' }

    # Network-TV transport for a monitor controlled as a TV (backend "tv").
    TVConn:
      type: object
      properties:
        type: { type: string, description: "webos (empty = none)" }
        host: { type: string, description: "TV IP or hostname" }
        mac: { type: string, description: "TV MAC for Wake-on-LAN power-on" }

    MonitorCapabilities:
      type: object
      required: [brightness, power, volume]
      properties:
        brightness: { type: boolean }
        power: { type: boolean }
        volume: { type: boolean }

    ActiveMonitor:
      type: object
      required: [width, height, refresh_rate, position_x, position_y, primary, model, scale]
      properties:
        width: { type: integer }
        height: { type: integer }
        refresh_rate: { type: number, format: double }
        position_x: { type: integer }
        position_y: { type: integer }
        primary: { type: boolean }
        model: { type: string }
        scale: { type: number, format: double, description: "logical scale factor (1 = 100%, 2 = 200%, 1.5 = 150% fractional)" }

    MonitorsResponse:
      type: array
      items:
        $ref: '#/components/schemas/Monitor'

    # --- Layout Types ---
    LayoutMonitor:
      type: object
      required: [name, edid, port, width, height, refresh_rate, position_x, position_y, primary, scale]
      properties:
        name: { type: string }
        edid: { type: string }
        port: { type: string }
        width: { type: integer }
        height: { type: integer }
        refresh_rate: { type: number, format: double }
        position_x: { type: integer }
        position_y: { type: integer }
        primary: { type: boolean }
        scale: { type: number, format: double, description: "logical scale factor (1 = 100%, 2 = 200%, 1.5 = 150% fractional)" }

    Layout:
      type: object
      required: [id, name, monitors, aliases]
      properties:
        id: { type: string }
        name: { type: string }
        emoji: { type: string }
        aliases:
          type: array
          items: { type: string }
        monitors:
          type: array
          items:
            $ref: '#/components/schemas/LayoutMonitor'

    LayoutsResponse:
      type: object
      required: [layouts, current_layout]
      properties:
        layouts:
          type: array
          items:
            $ref: '#/components/schemas/Layout'
        current_layout: { type: string }

    SwitchLayoutRequest:
      type: object
      required: [layout]
      properties:
        layout: { type: string }

    SwitchLayoutResponse:
      type: object
      required: [success, current_layout]
      properties:
        success: { type: boolean }
        current_layout: { type: string }
        message: { type: string }
        # What actually happened to the display, verified after applying. A
        # display server can accept a configuration and then roll it back, or
        # report a layout as already active while the screen shows something
        # else, so "success" alone is not enough to tell the user.
        outcome:
          type: string
          enum: [applied, already-active, rolled-back, mismatch, unverified]
          description: verified result of the switch

    AuthRequest:
      type: object
      required: [token]
      properties:
        token: { type: string }

    AuthResponse:
      type: object
      required: [success]
      properties:
        success: { type: boolean }
        message: { type: string }

    WakeRequest:
      type: object
      properties:
        target: { type: string, description: "linux | windows (optional; default boots the GRUB default)" }

    WakeResponse:
      type: object
      required: [success]
      properties:
        success: { type: boolean }
        message: { type: string }

    BootRequest:
      type: object
      required: [target]
      properties:
        target: { type: string, description: "linux | windows" }

    BootResponse:
      type: object
      required: [success]
      properties:
        success: { type: boolean }
        message: { type: string }

    SaveLayoutRequest:
      type: object
      required: [name]
      properties:
        id: { type: string }
        name: { type: string }
        emoji: { type: string }

    SaveLayoutResponse:
      type: object
      required: [success, layout]
      properties:
        success: { type: boolean }
        layout: { $ref: '#/components/schemas/Layout' }
        message: { type: string }

    RemoveLayoutRequest:
      type: object
      required: [layout]
      properties:
        layout: { type: string }

    RemoveLayoutResponse:
      type: object
      required: [success]
      properties:
        success: { type: boolean }
        message: { type: string }

    UpdateLayoutRequest:
      type: object
      required: [id]
      properties:
        id: { type: string, description: "ID of the layout to update" }
        name: { type: string, description: "New display name (optional; unchanged if omitted)" }
        emoji: { type: string, description: "New emoji (optional; empty string clears it, omitted leaves unchanged)" }
        aliases:
          type: array
          description: "Replacement alias list (optional; unchanged if omitted)"
          items: { type: string }
        capture_monitors:
          type: boolean
          description: >-
            Replace the layout's monitor configuration with the display setup
            that is active right now, keeping its id, name, emoji and aliases.
            Lets an existing layout be re-captured after adjusting the displays,
            instead of having to delete it and save a new one.

    UpdateLayoutResponse:
      type: object
      required: [success]
      properties:
        success: { type: boolean }
        layout: { $ref: '#/components/schemas/Layout' }
        message: { type: string }

    ShutdownResponse:
      type: object
      required: [success]
      properties:
        success: { type: boolean }
        message: { type: string }

    # --- Audio Types ---
    AudioSink:
      type: object
      required: [id, name, description, volume, muted, default]
      properties:
        id: { type: integer, format: uint32 }
        name: { type: string }
        description: { type: string }
        volume: { type: number, format: double }
        muted: { type: boolean }
        default: { type: boolean }

    AudioSinksResponse:
      type: array
      items:
        $ref: '#/components/schemas/AudioSink'

    SetAudioRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        volume: { type: number, format: double }
        muted: { type: boolean }
        default: { type: boolean }

    AudioResponse:
      type: object
      required: [success]
      properties:
        success: { type: boolean }
        message: { type: string }

    # --- Monitor Control Types ---
    SetBrightnessRequest:
      type: object
      required: [edid, brightness]
      properties:
        edid: { type: string }
        brightness: { type: integer }

    SetMonitorPowerRequest:
      type: object
      required: [edid, on]
      properties:
        edid: { type: string }
        on: { type: boolean }

    MonitorSettingsRequest:
      type: object
      required: [edid]
      properties:
        edid: { type: string }
        friendly_name: { type: string }
        backend: { type: string, description: "ddc | i2c | tv | none" }
        visibility:
          type: object
          additionalProperties: { type: boolean }
        tv: { $ref: '#/components/schemas/TVConn' }

    MonitorControlResponse:
      type: object
      required: [success]
      properties:
        success: { type: boolean }
        message: { type: string }

    MonitorPowerStateRequest:
      type: object
      required: [edid]
      properties:
        edid: { type: string }

    MonitorPowerStateResponse:
      type: object
      required: [edid, responding]
      properties:
        edid: { type: string }
        responding:
          type: boolean
          description: "true if the monitor answered the probe (i.e. powered on)"

    MonitorVolumeRequest:
      type: object
      required: [edid]
      properties:
        edid: { type: string }
        volume: { type: integer }
        muted: { type: boolean }

    MonitorPairRequest:
      type: object
      required: [edid]
      properties:
        edid: { type: string }

    MonitorInputRequest:
      type: object
      required: [edid, input]
      properties:
        edid: { type: string }
        input: { type: string }

    # Live state of a tv-backend monitor's network-TV integration.
    MonitorTVState:
      type: object
      required: [paired, pairing, on, volume, muted]
      properties:
        paired: { type: boolean }
        pairing: { type: boolean }
        # The panel is actually on (asked of the TV's power service) — a TV
        # with Quick Start+ answers the network in standby, so mere
        # connectivity doesn't mean "on".
        on: { type: boolean }
        volume: { type: integer }
        muted: { type: boolean }
        error: { type: string }

    SimStateResponse:
      type: object
      required: [state]
      properties:
        state: { type: string }

    SimSetStateRequest:
      type: object
      required: [state]
      properties:
        state: { type: string }

    # --- WebSocket Types ---
    MouseButton:
      type: string
      enum: ["left", "right", "middle", "back", "forward"]

    Modifier:
      type: string
      enum: ["alt", "ctrl", "meta", "shift"]

    TrackpadMessageMousePositionUpdate:
      type: object
      required: [type, x, 'y']
      properties:
        type: { type: string, enum: ["mousepositionupdate"] }
        x: { type: integer }
        'y': { type: integer }

    TrackpadMessageMouseMoveRelative:
      type: object
      required: [type, dx, dy]
      properties:
        type: { type: string, enum: ["mousemoverel"] }
        dx: { type: number, format: double }
        dy: { type: number, format: double }

    TrackpadMessageMouseMoveTo:
      type: object
      required: [type, x, 'y']
      properties:
        type: { type: string, enum: ["mousemoveto"] }
        x: { type: integer }
        'y': { type: integer }

    TrackpadMessageMouseClick:
      type: object
      required: [type, btn, modifiers]
      properties:
        type: { type: string, enum: ["mouseclick"] }
        btn: { $ref: '#/components/schemas/MouseButton' }
        modifiers:
          type: array
          items: { $ref: '#/components/schemas/Modifier' }

    TrackpadMessageMouseDown:
      type: object
      required: [type, btn, modifiers]
      properties:
        type: { type: string, enum: ["mousedown"] }
        btn: { $ref: '#/components/schemas/MouseButton' }
        modifiers:
          type: array
          items: { $ref: '#/components/schemas/Modifier' }

    TrackpadMessageMouseUp:
      type: object
      required: [type, btn, modifiers]
      properties:
        type: { type: string, enum: ["mouseup"] }
        btn: { $ref: '#/components/schemas/MouseButton' }
        modifiers:
          type: array
          items: { $ref: '#/components/schemas/Modifier' }

    TrackpadMessageMouseScroll:
      type: object
      required: [type, dx, dy]
      properties:
        type: { type: string, enum: ["mousescroll"] }
        dx: { type: number }
        dy: { type: number }
        precise: { type: boolean }

    TrackpadMessageKeyDown:
      type: object
      required: [type, key, modifiers]
      properties:
        type: { type: string, enum: ["keydown"] }
        key: { type: string }
        modifiers:
          type: array
          items: { $ref: '#/components/schemas/Modifier' }

    TrackpadMessageKeyUp:
      type: object
      required: [type, key, modifiers]
      properties:
        type: { type: string, enum: ["keyup"] }
        key: { type: string }
        modifiers:
          type: array
          items: { $ref: '#/components/schemas/Modifier' }

    TrackpadMessageText:
      type: object
      required: [type, text]
      properties:
        type: { type: string, enum: ["text"] }
        text: { type: string }

    # Server -> client only. Sent once when the trackpad socket is accepted, so
    # the frontend (which treats the first message as proof the agent end of the
    # proxy is live) marks the trackpad connected even when the cursor position
    # is unreadable — e.g. the uinput backend on Wayland.
    TrackpadMessageConnected:
      type: object
      required: [type]
      properties:
        type: { type: string, enum: ["connected"] }

    TrackpadMessage:
      oneOf:
        - $ref: '#/components/schemas/TrackpadMessageMousePositionUpdate'
        - $ref: '#/components/schemas/TrackpadMessageMouseMoveRelative'
        - $ref: '#/components/schemas/TrackpadMessageMouseMoveTo'
        - $ref: '#/components/schemas/TrackpadMessageMouseClick'
        - $ref: '#/components/schemas/TrackpadMessageMouseDown'
        - $ref: '#/components/schemas/TrackpadMessageMouseUp'
        - $ref: '#/components/schemas/TrackpadMessageMouseScroll'
        - $ref: '#/components/schemas/TrackpadMessageKeyDown'
        - $ref: '#/components/schemas/TrackpadMessageKeyUp'
        - $ref: '#/components/schemas/TrackpadMessageText'
        - $ref: '#/components/schemas/TrackpadMessageConnected'
      discriminator:
        propertyName: type
        mapping:
          mousepositionupdate: '#/components/schemas/TrackpadMessageMousePositionUpdate'
          mousemoverel: '#/components/schemas/TrackpadMessageMouseMoveRelative'
          mousemoveto: '#/components/schemas/TrackpadMessageMouseMoveTo'
          mouseclick: '#/components/schemas/TrackpadMessageMouseClick'
          mousedown: '#/components/schemas/TrackpadMessageMouseDown'
          mouseup: '#/components/schemas/TrackpadMessageMouseUp'
          mousescroll: '#/components/schemas/TrackpadMessageMouseScroll'
          keydown: '#/components/schemas/TrackpadMessageKeyDown'
          keyup: '#/components/schemas/TrackpadMessageKeyUp'
          text: '#/components/schemas/TrackpadMessageText'
          connected: '#/components/schemas/TrackpadMessageConnected'
